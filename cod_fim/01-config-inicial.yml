---
# ==============================================================================
# PLAYBOOK: FASE 1 - CONFIGURACAO BASE DO SERVIDOR
# ==============================================================================
# Objetivo: Preparar a fundacao do Sistema Operacional (Regionalizacao e Rede).
# Idempotencia: Total. Pode ser executado multiplas vezes sem falhas.
# ==============================================================================
- name: Fase 1 - Configuracao Base do Servidor
  hosts: POC-Powerbuilder
  gather_facts: yes

  vars:
    # Diretorio raiz de apoio para downloads e extracao de pacotes nas fases seguintes
    dir_temp: "C:\\temp"

  tasks:
    # ---------------------------------------------------------
    # PASSO 1: FUSO HORARIO E REGIAO
    # ---------------------------------------------------------
    # Logica Dinamica: A variavel 'prefixo' le os 3 primeiros caracteres do nome 
    # da maquina no inventario para determinar a localidade geografica.
    - name: "1.1 Extrair o prefixo do servidor (ex EMT, EAC)"
      ansible.builtin.set_fact:
        prefixo: "{{ inventory_hostname[0:3] | upper }}"

    # Condicional Jinja2 (inline para evitar espacos em branco que quebram a API do Windows)
    - name: 1.2 Definir Fuso Horario baseado no prefixo
      ansible.windows.win_timezone:
        timezone: "{% if prefixo == 'EMT' %}SA Western Standard Time{% elif prefixo == 'EAC' %}SA Pacific Standard Time{% else %}E. South America Standard Time{% endif %}"

    # Padronizacao do GeoID (location: 32 = Brasil) e formato de dados para evitar 
    # problemas de data/hora na aplicacao PowerBuilder.
    - name: 1.3 Configurar Regiao (Brasil) e Formatos
      ansible.windows.win_region:
        location: 32
        format: pt-BR
        unicode_language: pt-BR

    # ---------------------------------------------------------
    # PASSO 2 E 3: FIREWALL E PASTA TEMP
    # ---------------------------------------------------------
    # Garante a comunicacao livre na rede interna para aplicacoes legadas e TNS do Oracle.
    - name: 2. Desabilitar Firewall (Domain, Private e Public)
      ansible.windows.win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    # Prepara o ambiente de stage local exigido pelas Fases 2 e 3.
    - name: 3. Criar pasta temporaria de compartilhamento
      ansible.windows.win_file:
        path: "{{ dir_temp }}"
        state: directory