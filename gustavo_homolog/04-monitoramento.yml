# ============================================================
# 04-monitoramento.yml - PowerBuilder
# ============================================================
# Fase 4: Instalação dos agentes de monitoramento
# Passos: 6 (Metricbeat e Zabbix)
# ============================================================
- name: Fase 4 - Instalação dos Agentes de Monitoramento
  hosts: POC-Powerbuilder
  gather_facts: no

  vars:
    # Caminho dos instaladores no file server — confirmar com Alessandro
    caminho_instaladores: "\\\\MGDSC\\instaladores"

    # Versão do Metricbeat — confirmar versão utilizada no ambiente
    metricbeat_versao: "8.x"

    # Config de referência — pega de um servidor já monitorado
    metricbeat_config_origem: "\\\\MGSERVA-PLH1\\C$\\Program Files\\Elastic\\metricbeat.yml"
    zabbix_config_origem: "\\\\MGSERVA-PLH1\\C$\\Program Files\\Zabbix Agent\\zabbix_agentd.conf"

  tasks:
    # ----------------------------------------------------------
    # PASSO 6 — Instalar Metricbeat (agente ELK)
    # ----------------------------------------------------------
    # win_package já é idempotente com state: present — não precisa
    # de ignore_errors, que só mascararia falhas reais de instalação.
    - name: "6.1 | Instalar Metricbeat"
      ansible.windows.win_package:
        path: "{{ caminho_instaladores }}\\Metricbeat\\metricbeat-setup.msi"
        state: present

    - name: "6.2 | Copiar configuração do Metricbeat de servidor de referência"
      ansible.windows.win_copy:
        src: "{{ metricbeat_config_origem }}"
        dest: "C:\\Program Files\\Elastic\\metricbeat.yml"
        remote_src: yes

    - name: "6.3 | Iniciar serviço do Metricbeat"
      ansible.windows.win_service:
        name: metricbeat
        state: started
        start_mode: auto

    # ----------------------------------------------------------
    # PASSO 6 — Instalar Zabbix Agent
    # ----------------------------------------------------------
    - name: "6.4 | Instalar Zabbix Agent"
      ansible.windows.win_package:
        path: "{{ caminho_instaladores }}\\Zabbix\\zabbix_agent-setup.msi"
        state: present

    - name: "6.5 | Copiar configuração do Zabbix de servidor de referência"
      ansible.windows.win_copy:
        src: "{{ zabbix_config_origem }}"
        dest: "C:\\Program Files\\Zabbix Agent\\zabbix_agentd.conf"
        remote_src: yes

    - name: "6.6 | Iniciar serviço do Zabbix Agent"
      ansible.windows.win_service:
        name: "Zabbix Agent"
        state: started
        start_mode: auto