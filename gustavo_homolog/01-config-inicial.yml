# ==============================================================================
# 01-config-inicial.yml - PowerBuilder
# ==============================================================================
# Fase 1: Configuração inicial do servidor
# Passos: 1 (fuso horário + região), 2 (firewall), 3 (pasta temp)
# Idempotência: total. Pode ser executado múltiplas vezes sem falhas.
# ==============================================================================
- name: Configuração Inicial do Servidor PowerBuilder
  hosts: POC-Powerbuilder
  gather_facts: no
  vars:
    # Diretório temporário de apoio para as fases seguintes
    dir_temp: "C:\\temp"

  tasks:
    # ----------------------------------------------------------
    # PASSO 1 — Fuso horário dinâmico por prefixo do hostname
    # ----------------------------------------------------------
    # Ajustar os prefixos abaixo para os hostnames reais da Energisa
    # (ex: EMG, ESP, ERJ, EES, EBA -> SP/MG/RJ/ES/BA ; EMT, EMS -> MT/MS ; EAC -> AC)
    - name: "Passo 1.1 | Extrair prefixo do servidor"
      ansible.builtin.set_fact:
        prefixo: "{{ inventory_hostname[0:3] | upper }}"

    - name: "Passo 1.2 | Alterar fuso horário do servidor"
      community.windows.win_timezone:
        timezone: >-
          {% if prefixo in ['EMT', 'EMS'] %}Central America Standard Time
          {%- elif prefixo == 'EAC' %}SA Pacific Standard Time
          {%- else %}E. South America Standard Time{% endif %}

    - name: "Passo 1.3 | Configurar Região (Brasil) e Formatos"
      ansible.windows.win_region:
        location: 32
        format: pt-BR
        unicode_language: pt-BR

    # ----------------------------------------------------------
    # PASSO 2 — Desabilitar Firewall Windows (todos os perfis)
    # ----------------------------------------------------------
    - name: "Passo 2 | Desabilitar Firewall - Domain, Private e Public"
      community.windows.win_firewall:
        profiles:
          - Domain
          - Private
          - Public
        state: disabled

    # ----------------------------------------------------------
    # PASSO 3 — Criar pasta temporária de apoio
    # ----------------------------------------------------------
    - name: "Passo 3 | Criar pasta temporária"
      ansible.windows.win_file:
        path: "{{ dir_temp }}"
        state: directory