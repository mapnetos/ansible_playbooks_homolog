# ============================================================
# main.yml - PowerBuilder
# ============================================================
# Orquestrador: importa as 5 fases do deploy PowerBuilder na
# ordem correta. Cada fase é idempotente e pode também ser
# rodada isoladamente, se necessário, apontando direto pro
# arquivo da fase.
# ============================================================
# Fase 1: Configuração base do servidor (fuso, região, firewall, C:\temp)
# Fase 2: Instalação e configuração do Oracle Client
# Fase 3: Serviços PowerBuilder (registro CFLCL, pastas, compartilhamentos)
# Fase 4: Agentes de monitoramento (Metricbeat, Zabbix)
# Fase 5: Atualização do Windows e reinicialização final (único reboot)
# ============================================================

- name: "Fase 1 - Configuração Base do Servidor"
  ansible.builtin.import_playbook: 01-config-inicial.yml

- name: "Fase 2 - Instalação e Configuração do Oracle Client"
  ansible.builtin.import_playbook: 02-oracle.yml

- name: "Fase 3 - Serviços PowerBuilder e Compartilhamentos"
  ansible.builtin.import_playbook: 03-servicos.yml

- name: "Fase 4 - Agentes de Monitoramento"
  ansible.builtin.import_playbook: 04-monitoramento.yml

- name: "Fase 5 - Atualização e Reinicialização Final"
  ansible.builtin.import_playbook: 05-atualizacao-reboot.yml